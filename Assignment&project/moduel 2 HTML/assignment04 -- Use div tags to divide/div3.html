<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main {
            width: 500px;
            height: 400px;
            text-align: center;
        }

        .row1 {
            font-size: 20px;
            align-content: space-around;
            height: 100px;
            border: 1px solid black;
            background-color: whitesmoke;
        }

        .row2 {
            height: 100px;
            border: 1px solid black;
            background-color: darkblue;

        }
        .box1{
            width: 122px;
            border: 2px solid black;
            height: 98px;
            float: left;
        }
        .box2{
            width: 122px;
            border: 2px solid black;
            height: 98px;
            float: left;
        }
        .box3{
            width: 120px;
            border: 2px solid black;
            height: 98px;
            float: left;
        }
        .box4{
            width: 120px;
            border: 2px solid black;
            height: 96px;
            float: left;
        }

        .row3 {
            height: 100px;
            border: 1px solid black;
        }

        .row4 {
            height: 100px;
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="row1">Welcome to WSCUBE TECH</div>
        <div class="row2">
            <div class="box1"></div>
            <div class="box2"></div>
            <div class="box3"></div>
            <div class="box4"></div>
        </div>
        <div class="row3"></div>
        <div class="row4"></div>
    </div>
</body>

</html>
